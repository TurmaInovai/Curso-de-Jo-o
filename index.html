<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beware the Meteor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="hud" class="hidden">
                <div class="score-board">Pontos: <span id="scoreDisplay">0</span></div>
            </div>

            <div id="main-menu" class="menu-panel">
                <h1 class="glitch" data-text="BEWARE THE METEOR">BEWARE THE METEOR</h1>
                <p>Use [W][A][S][D] ou [Setas] para mover.<br>Cuidado com os meteoros!</p>
                
                <div class="difficulty-selector">
                    <button class="diff-btn active" data-diff="1">FÁCIL</button>
                    <button class="diff-btn" data-diff="1.5">MÉDIO</button>
                    <button class="diff-btn" data-diff="2.5">DIFÍCIL</button>
                </div>

                <div class="speed-toggle" style="margin-bottom: 25px;">
                    <label style="cursor:pointer; color: #ff003c; font-weight: bold; text-shadow: 0 0 5px rgba(255,0,60,0.8);">
                        <input type="checkbox" id="doubleSpeedCheck" style="transform: scale(1.5); margin-right: 10px;">
                        VELOCIDADE 2X (PONTOS 2X)
                    </label>
                </div>

                <button id="startBtn" class="neon-button">INICIAR MISSÃO</button>
            </div>

            <div id="game-over" class="menu-panel hidden">
                <h2 class="neon-text-red">FIM DE JOGO</h2>
                <div class="final-score">Sua Nave Bateu! Pontuação: <span id="finalScoreDisplay">0</span></div>
                
                <div id="leaderboard">
                    <h3>🏆 TOP RECORDES</h3>
                    <table id="scoresTable">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Pontos</th>
                            </tr>
                        </thead>
                        <tbody id="scoresBody">
                            <!-- Scores go here -->
                        </tbody>
                    </table>
                </div>

                <button id="restartBtn" class="neon-button">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
